<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对对碰游戏 - Match Pair Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .game-header {
            margin-bottom: 20px;
        }

        .game-title {
            font-size: 32px;
            color: #667eea;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: #f0f0f0;
            border-radius: 10px;
        }

        .moves-counter {
            font-size: 18px;
            color: #333;
        }

        .moves-count {
            color: #667eea;
            font-weight: bold;
            font-size: 24px;
        }

        .restart-btn {
            padding: 10px 25px;
            font-size: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .restart-btn:active {
            transform: translateY(0);
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        /* 单元格尺寸：最小80px，响应式 */
        .card {
            width: 80px;
            height: 80px;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.6s;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card.matched .card-inner {
            background: rgba(102, 126, 234, 0.2);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            backface-visibility: hidden;
        }

        .card-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: bold;
        }

        .card-back {
            background: white;
            transform: rotateY(180deg);
            border: 3px solid #667eea;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        /* 胜利弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: white;
            padding: 40px 50px;
            border-radius: 20px;
            text-align: center;
            animation: modalIn 0.5s ease;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-title {
            font-size: 32px;
            color: #667eea;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .modal-message {
            font-size: 18px;
            color: #333;
            margin-bottom: 25px;
        }

        .modal-btn {
            padding: 12px 30px;
            font-size: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .modal.active {
            display: flex;
        }

        /* 响应式设计 */
        @media (max-width: 500px) {
            .card {
                width: 65px;
                height: 65px;
            }

            .card-front, .card-back {
                font-size: 28px;
            }

            .game-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 游戏标题区域 -->
        <div class="game-header">
            <h1 class="game-title">🎮 对对碰游戏</h1>
        </div>

        <!-- 游戏信息区域 -->
        <div class="game-info">
            <div class="moves-counter">
                尝试次数：<span class="moves-count" id="movesCount">0</span>
            </div>
            <button class="restart-btn" id="restartBtn">🔄 重新开始</button>
        </div>

        <!-- 游戏面板区域 -->
        <div class="game-board" id="gameBoard">
            <!-- 卡片将通过 JavaScript 动态生成 -->
        </div>
    </div>

    <!-- 胜利弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2 class="modal-title">🎉 恭喜胜利！</h2>
            <p class="modal-message">你用了 <span id="finalMoves">0</span> 次尝试完成游戏！</p>
            <button class="modal-btn" id="modalRestartBtn">🔄 再玩一次</button>
        </div>
    </div>

    <script>
        // 游戏配置与状态
        const symbols = ['🍎', '🍊', '🍋', '🍇', '🍓', '🍒', '🥝', '🍍']; // 8种水果符号
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let isProcessing = false;

        // 获取DOM元素
        const gameBoard = document.getElementById('gameBoard');
        const movesCount = document.getElementById('movesCount');
        const restartBtn = document.getElementById('restartBtn');
        const modalOverlay = document.getElementById('modalOverlay');
        const finalMoves = document.getElementById('finalMoves');
        const modalRestartBtn = document.getElementById('modalRestartBtn');

        // 初始化游戏
        function initGame() {
            // 重置游戏状态
            matchedPairs = 0;
            moves = 0;
            flippedCards = [];
            isProcessing = false;
            movesCount.textContent = moves;

            // 创建卡片数组（8对符号）
            const cardPairs = [...symbols, ...symbols];
            cards = shuffle(cardPairs);

            // 渲染游戏面板
            renderBoard();
        }

        // 洗牌函数（Fisher-Yates 算法）
        function shuffle(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        // 渲染游戏面板
        function renderBoard() {
            gameBoard.innerHTML = '';
            cards.forEach((symbol, index) => {
                const card = createCard(symbol, index);
                gameBoard.appendChild(card);
            });
        }

        // 创建单个卡片DOM
        function createCard(symbol, index) {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.index = index;
            card.dataset.symbol = symbol;

            card.innerHTML = `
                <div class="card-inner">
                    <div class="card-front">?</div>
                    <div class="card-back">${symbol}</div>
                </div>
            `;

            // 绑定点击事件
            card.addEventListener('click', () => handleCardClick(card));

            return card;
        }

        // 处理卡片点击事件
        function handleCardClick(card) {
            // 如果正在处理中、卡片已翻转或已匹配，则忽略
            if (isProcessing || card.classList.contains('flipped') || card.classList.contains('matched')) {
                return;
            }

            // 翻转卡片
            flipCard(card);
            flippedCards.push(card);

            // 如果翻转了两张卡片，检查配对
            if (flippedCards.length === 2) {
                moves++;
                movesCount.textContent = moves;
                checkMatch();
            }
        }

        // 翻转卡片
        function flipCard(card) {
            card.classList.add('flipped');
        }

        // 检查配对逻辑
        function checkMatch() {
            isProcessing = true;
            const [card1, card2] = flippedCards;

            // 比较两张卡片的符号
            if (card1.dataset.symbol === card2.dataset.symbol) {
                // 配对成功
                matchedPairs++;
                card1.classList.add('matched');
                card2.classList.add('matched');
                flippedCards = [];
                isProcessing = false;

                // 检查游戏是否结束
                if (matchedPairs === symbols.length) {
                    setTimeout(showWinModal, 500);
                }
            } else {
                // 配对失败，延迟后翻回
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    isProcessing = false;
                }, 1000);
            }
        }

        // 显示胜利弹窗
        function showWinModal() {
            finalMoves.textContent = moves;
            modalOverlay.classList.add('active');
        }

        // 隐藏胜利弹窗
        function hideWinModal() {
            modalOverlay.classList.remove('active');
        }

        // 绑定重新开始按钮事件
        restartBtn.addEventListener('click', initGame);

        // 绑定弹窗中重新开始按钮事件
        modalRestartBtn.addEventListener('click', () => {
            hideWinModal();
            initGame();
        });

        // 启动游戏
        initGame();
    </script>
</body>
</html>
